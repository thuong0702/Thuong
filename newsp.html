<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ảnh Chồng Lên Nhau</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; /* Màu nền */
        }
        .container {
            position: relative; /* Đặt vị trí cho khung chứa */
            width: 100%; /* Chiều rộng 80% màn hình */
            max-width: 600px; /* Chiều rộng tối đa */
        }
        .background-image {
            width: 100%; /* Ảnh nền chiếm toàn bộ khung */
            height: auto;
        }
        .overlay-image {
            position: absolute; /* Đặt vị trí tuyệt đối */
            top: 20px; /* Khoảng cách từ trên */
            left: 20px; /* Khoảng cách từ trái */
            width: 100px; /* Chiều rộng ảnh nổi lên */
            height: auto;
            border: 2px solid white; /* Viền trắng cho ảnh nổi */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); /* Hiệu ứng bóng */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="media/giỏ hàng.jpg" alt="Ảnh nền" class="background-image">
        <img src="media/duong mi.jpg" alt="Ảnh nổi lên" class="overlay-image">
    </div>
   <h2> hjkkihkjii
    jkhikhio
    ugyugi</h2>
</body>
</html>
